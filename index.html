    <script>
        (function() {
            // Защита от взлома
            let game = null;
            let cheaterDetected = false;

            function showCheaterBanner() {
                if (document.getElementById('cheaterBanner')) return;
                const banner = document.createElement('div');
                banner.id = 'cheaterBanner';
                banner.className = 'cheater-banner';
                banner.innerText = '🚫 Я ЧИТЕР 🚫';
                document.body.appendChild(banner);
                document.getElementById('gameWrapper').classList.add('blurred');
                document.querySelectorAll('button').forEach(b => b.disabled = true);
                cheaterDetected = true;
            }

            setInterval(() => {
                if (game && !cheaterDetected) {
                    if (game.cash < 0 || game.cash > 1000000) showCheaterBanner();
                    if (game.equipment.length > 20) showCheaterBanner();
                    if (game.activeLoans.length > 5) showCheaterBanner();
                    if (isNaN(game.cash) || isNaN(game.day)) showCheaterBanner();
                }
            }, 1500);

            // Константы
            const BASE_PRICES = { toy: 22, furniture: 45, food: 12 };
            const BASE_COSTS = { toy: 5, furniture: 20, food: 3 };

            const PRODUCT_TYPES = {
                toy: { name: '🧸 Игрушки', cost: BASE_COSTS.toy },
                furniture: { name: '🪑 Мебель', cost: BASE_COSTS.furniture },
                food: { name: '🍫 Еда', cost: BASE_COSTS.food }
            };

            const MACHINES = [
                { id: 'machine_toy', name: '🧸 Игрушечный станок', productType: 'toy', price: 600, outputPerDay: 10, costPerItem: BASE_COSTS.toy },
                { id: 'machine_furniture', name: '🪑 Мебельный станок', productType: 'furniture', price: 1000, outputPerDay: 5, costPerItem: BASE_COSTS.furniture },
                { id: 'machine_food', name: '🍫 Пищевой станок', productType: 'food', price: 800, outputPerDay: 15, costPerItem: BASE_COSTS.food }
            ];

            const LOAN_OFFERS = [
                { id: 'loan_small', name: '🐣 Малый (до 500)', maxAmount: 500, interestRate: 0.02, termDays: 7 },
                { id: 'loan_medium', name: '🦊 Средний (до 1000)', maxAmount: 1000, interestRate: 0.025, termDays: 10 },
                { id: 'loan_big', name: '🐻 Большой (до 2000)', maxAmount: 2000, interestRate: 0.03, termDays: 15 }
            ];

            const MAX_LOANS = 2;

            // Очередь уведомлений
            let notificationQueue = [];
            let notificationModalActive = false;

            function getSaveKey(name) {
                return 'little_entrepreneur_' + (name || 'default');
            }

            function loadProfileList() {
                const select = document.getElementById('profileSelect');
                select.innerHTML = '<option value="">-- Выберите существующий профиль --</option>';
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('little_entrepreneur_')) {
                        const name = key.replace('little_entrepreneur_', '');
                        if (name && name !== 'default') {
                            const option = document.createElement('option');
                            option.value = name;
                            option.textContent = name;
                            select.appendChild(option);
                        }
                    }
                }
            }

            function saveGame() {
                if (!game || !game.playerName) return;
                try {
                    localStorage.setItem(getSaveKey(game.playerName), JSON.stringify(game));
                    loadProfileList();
                } catch (e) {}
            }

            function generateRandomOrder() {
                const types = ['toy', 'furniture', 'food'];
                const type = types[Math.floor(Math.random() * types.length)];
                const basePrice = BASE_PRICES[type];
                let quantity;
                if (type === 'toy') quantity = 20 + Math.floor(Math.random() * 60);
                else if (type === 'furniture') quantity = 5 + Math.floor(Math.random() * 20);
                else quantity = 30 + Math.floor(Math.random() * 80);
                const daysLeft = 3 + Math.floor(Math.random() * 8);
                const urgencyBonus = 1 + (10 - daysLeft) * 0.05;
                const pricePerUnit = Math.floor(basePrice * urgencyBonus);
                return {
                    id: 'order_' + Date.now() + Math.random(),
                    productType: type,
                    quantity: quantity,
                    pricePerUnit: pricePerUnit,
                    daysLeft: daysLeft,
                    penaltyRate: 0.1,
                    totalValue: quantity * pricePerUnit
                };
            }

            function recalcRating() {
                const totalDebt = game.activeLoans.reduce((sum, loan) => sum + loan.amount, 0);
                const netWorth = game.cash - totalDebt;
                let rating = Math.floor(netWorth / 10);
                rating += game.equipment.filter(m => m.health > 0).length * 30;
                rating += game.completedOrders * 20;
                rating -= game.failedOrders * 30;
                rating += game.day;
                game.rating = Math.max(0, rating);
            }

            function hasWorkingMachine(type) {
                return game.equipment.some(m => m.productType === type && m.health > 0);
            }

            function getProductName(type) {
                return PRODUCT_TYPES[type]?.name || type;
            }

            function showNotification(message) {
                notificationQueue.push(message);
                if (!notificationModalActive) {
                    showNextNotification();
                }
            }

            function showNextNotification() {
                if (notificationQueue.length === 0) {
                    notificationModalActive = false;
                    return;
                }
                notificationModalActive = true;
                const msg = notificationQueue.shift();
                document.getElementById('notificationMessage').innerText = msg;
                document.getElementById('notificationModal').classList.add('active');
            }

            function closeNotification() {
                document.getElementById('notificationModal').classList.remove('active');
                notificationModalActive = false;
                showNextNotification();
            }

            function takeOrder(orderId) {
                if (cheaterDetected) return;
                const index = game.availableOrders.findIndex(o => o.id === orderId);
                if (index === -1) return;
                const order = game.availableOrders[index];
                if (!hasWorkingMachine(order.productType)) {
                    showNotification('❌ Нет работающего станка для этого товара!');
                    return;
                }
                game.myOrders.push({ ...order });
                game.availableOrders.splice(index, 1);
                showNotification(`✅ Заказ на ${getProductName(order.productType)} принят!`);
                render();
            }

            function buyMachine(machineId) {
                if (cheaterDetected) return;
                const machineTemplate = MACHINES.find(m => m.id === machineId);
                if (!machineTemplate) return;
                if (game.cash < machineTemplate.price) {
                    showNotification('💰 Недостаточно денег для покупки станка');
                    return;
                }
                game.cash -= machineTemplate.price;
                const newMachine = {
                    ...machineTemplate,
                    health: 100,
                    uid: machineTemplate.id + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8)
                };
                game.equipment.push(newMachine);
                showNotification(`🔧 Куплен ${machineTemplate.name}`);
                render();
                closeModal('shopModal');
            }

            function repairMachine(uid) {
                if (cheaterDetected) return;
                const machine = game.equipment.find(m => m.uid === uid);
                if (!machine) {
                    showNotification('❌ Станок не найден');
                    return;
                }
                if (machine.health >= 100) return;
                const repairCost = Math.floor(machine.price * 0.3);
                if (game.cash < repairCost) {
                    showNotification('💰 Не хватает денег на ремонт');
                    return;
                }
                game.cash -= repairCost;
                machine.health = 100;
                showNotification(`🔧 Станок ${machine.name} отремонтирован за ${repairCost} монет`);
                render();
            }

            function takeLoan(offerId, amount) {
                if (cheaterDetected) return;
                if (game.activeLoans.length >= MAX_LOANS) {
                    showNotification(`❌ Нельзя взять больше ${MAX_LOANS} кредитов одновременно`);
                    return;
                }
                const offer = LOAN_OFFERS.find(o => o.id === offerId);
                if (!offer) return;
                if (amount > offer.maxAmount || amount <= 0) return;
                game.cash += amount;
                game.activeLoans.push({
                    amount: amount,
                    interestRate: offer.interestRate,
                    daysLeft: offer.termDays
                });
                showNotification(`💳 Кредит ${amount} монет выдан`);
                render();
                closeModal('loanModal');
            }

            function nextDay() {
                if (cheaterDetected) return;
                // Производство
                game.equipment.forEach(m => {
                    if (m.health <= 0) return;
                    const type = m.productType;
                    const out = m.outputPerDay;
                    const cost = m.costPerItem * out;
                    if (game.cash >= cost) {
                        game.cash -= cost;
                        game.storage[type] += out;
                    } else {
                        showNotification(`⚠️ Не хватило денег на производство ${getProductName(type)}`);
                    }
                });

                // Износ
                game.equipment.forEach(m => {
                    if (m.health <= 0) return;
                    const wear = 5 + Math.floor(Math.random() * 11);
                    m.health = Math.max(0, m.health - wear);
                    if (m.health <= 0) {
                        showNotification(`💥 Станок ${m.name} сломался и утилизирован!`);
                    } else if (m.health < 30) {
                        showNotification(`⚠️ Станок ${m.name} в плохом состоянии (здоровье ${m.health}%)! Отремонтируй.`);
                    }
                });
                game.equipment = game.equipment.filter(m => m.health > 0);

                // Выполнение заказов
                for (let i = game.myOrders.length - 1; i >= 0; i--) {
                    const order = game.myOrders[i];
                    if (game.storage[order.productType] >= order.quantity) {
                        game.storage[order.productType] -= order.quantity;
                        const income = order.quantity * order.pricePerUnit;
                        game.cash += income;
                        game.myOrders.splice(i, 1);
                        game.completedOrders++;
                        showNotification(`🎉 Заказ выполнен: ${getProductName(order.productType)} ${order.quantity} шт, +${income} монет`);
                    }
                }

                // Просрочка
                for (let i = game.myOrders.length - 1; i >= 0; i--) {
                    const order = game.myOrders[i];
                    order.daysLeft -= 1;
                    if (order.daysLeft < 0) {
                        const penalty = Math.floor(order.quantity * order.pricePerUnit * order.penaltyRate);
                        game.cash = Math.max(0, game.cash - penalty);
                        game.myOrders.splice(i, 1);
                        game.failedOrders++;
                        showNotification(`💔 Заказ просрочен! Штраф ${penalty} монет`);
                    }
                }

                // Кредиты
                for (let i = game.activeLoans.length - 1; i >= 0; i--) {
                    const loan = game.activeLoans[i];
                    const interest = Math.floor(loan.amount * loan.interestRate);
                    loan.amount += interest;
                    loan.daysLeft -= 1;

                    if (loan.daysLeft <= 0) {
                        if (game.cash >= loan.amount) {
                            game.cash -= loan.amount;
                            game.activeLoans.splice(i, 1);
                            showNotification(`✅ Кредит погашен (${Math.round(loan.amount)} монет)`);
                        } else {
                            showNotification(`💥 БАНКРОТСТВО! Не хватило на кредит. Игра окончена.`);
                            document.querySelectorAll('button').forEach(b => b.disabled = true);
                            return;
                        }
                    }
                }

                // Старение доступных заказов
                for (let i = game.availableOrders.length - 1; i >= 0; i--) {
                    const order = game.availableOrders[i];
                    order.daysLeft -= 1;
                    if (order.daysLeft <= 0) {
                        game.availableOrders.splice(i, 1);
                        showNotification(`⏳ Заказ на ${getProductName(order.productType)} истёк (не взят)`);
                    }
                }

                // Новые заказы
                for (let i = 0; i < 2 + Math.floor(Math.random() * 2); i++) {
                    game.availableOrders.push(generateRandomOrder());
                }

                game.day += 1;
                render();
            }

            function render() {
                if (cheaterDetected) return;
                recalcRating();

                document.getElementById('cashDisplay').innerText = game.cash;
                document.getElementById('dayDisplay').innerText = game.day;
                document.getElementById('ratingDisplay').innerText = game.rating;

                const ordersDiv = document.getElementById('ordersContainer');
                if (game.availableOrders.length === 0) {
                    ordersDiv.innerHTML = '<div class="order-card">😴 Новых заказов пока нет</div>';
                } else {
                    ordersDiv.innerHTML = game.availableOrders.map(order => {
                        const canTake = hasWorkingMachine(order.productType);
                        return `<div class="order-card" style="background:${!canTake ? '#ffe0e0' : '#f0f7fe'}">
                            <div class="order-header">
                                <span>${getProductName(order.productType)}</span>
                                <span>${order.quantity} шт</span>
                            </div>
                            <div class="order-detail">
                                <span>💰 ${order.pricePerUnit} мон/шт</span>
                                <span>💵 ${order.totalValue}</span>
                            </div>
                            <div class="order-detail">
                                <span>⏳ осталось дней: ${order.daysLeft}</span>
                            </div>
                            <button class="take-btn" data-id="${order.id}" ${!canTake ? 'disabled' : ''}>✅ Взять</button>
                        </div>`;
                    }).join('');
                }

                const myOrdersDiv = document.getElementById('myOrdersContainer');
                if (game.myOrders.length === 0) {
                    myOrdersDiv.innerHTML = '<div class="order-card">📭 Нет взятых заказов</div>';
                } else {
                    myOrdersDiv.innerHTML = game.myOrders.map(order => {
                        return `<div class="order-card">
                            <div class="order-header">
                                <span>${getProductName(order.productType)}</span>
                                <span>${order.quantity} шт</span>
                            </div>
                            <div class="order-detail">
                                <span>💰 ${order.pricePerUnit} мон/шт</span>
                                <span>💵 ожидаем ${order.totalValue}</span>
                            </div>
                            <div class="order-detail">
                                <span>⏳ осталось дней: ${order.daysLeft}</span>
                            </div>
                        </div>`;
                    }).join('');
                }

                const machinesDiv = document.getElementById('machinesTab');
                if (game.equipment.length === 0) {
                    machinesDiv.innerHTML = '<div>🚫 У вас нет станков. Купите первый!</div>';
                } else {
                    const groups = {};
                    game.equipment.forEach(m => {
                        if (!groups[m.productType]) groups[m.productType] = { count: 0, totalOutput: 0, totalHealth: 0 };
                        groups[m.productType].count++;
                        groups[m.productType].totalOutput += m.outputPerDay;
                        groups[m.productType].totalHealth += m.health;
                    });

                    let summaryHtml = '<div class="machine-summary">';
                    for (let type in groups) {
                        const avgHealth = Math.round(groups[type].totalHealth / groups[type].count);
                        summaryHtml += `<div class="summary-item">${getProductName(type)}: ${groups[type].count} станков, ⚡️ ${groups[type].totalOutput}/день, ❤️ среднее ${avgHealth}%</div>`;
                    }
                    summaryHtml += '</div>';

                    const listHtml = game.equipment.map(m => {
                        const health = m.health;
                        const healthColor = health < 30 ? 'health-critical' : '';
                        return `<div class="machine-item">
                            <div class="machine-info">
                                <strong>${m.name}</strong>
                                <span>⚡️ ${m.outputPerDay}/день | себест. ${m.costPerItem} мон</span>
                                <div class="health-bar">
                                    <div class="health-fill ${healthColor}" style="width:${health}%;"></div>
                                </div>
                                ${health < 30 && health > 0 ? '<span style="color:#c44;">⚠️ скоро поломка</span>' : ''}
                            </div>
                            <button class="repair-btn" data-uid="${m.uid}" ${health >= 100 ? 'disabled' : ''}>🛠 Ремонт (30% цены)</button>
                        </div>`;
                    }).join('');
                    machinesDiv.innerHTML = summaryHtml + listHtml;
                }

                const storageDiv = document.getElementById('storageTab');
                const nonEmpty = Object.entries(game.storage).filter(([_, v]) => v > 0);
                if (nonEmpty.length === 0) {
                    storageDiv.innerHTML = '<div>📭 Склад пуст</div>';
                } else {
                    storageDiv.innerHTML = nonEmpty.map(([type, amount]) => {
                        const cost = PRODUCT_TYPES[type]?.cost || 0;
                        return `<div class="storage-item">
                            <span>${getProductName(type)}</span>
                            <span><strong>${amount} шт</strong> (себест. ${cost} мон/шт)</span>
                        </div>`;
                    }).join('');
                }

                const loansDiv = document.getElementById('activeLoansContainer');
                if (game.activeLoans.length === 0) {
                    loansDiv.innerHTML = '<div>✅ Нет активных кредитов</div>';
                } else {
                    loansDiv.innerHTML = game.activeLoans.map(loan => {
                        return `<div class="loan-item">
                            <span>💰 ${Math.round(loan.amount)} мон</span>
                            <span>⏳ ${loan.daysLeft} дн.</span>
                        </div>`;
                    }).join('');
                }

                document.querySelectorAll('.take-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => takeOrder(e.target.dataset.id));
                });
                document.querySelectorAll('.repair-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => repairMachine(e.target.dataset.uid));
                });

                saveGame();
            }

            function openModal(id) {
                document.getElementById(id).classList.add('active');
                if (id === 'shopModal') fillShopModal();
                if (id === 'loanModal') fillLoanModal();
            }

            function closeModal(id) {
                document.getElementById(id).classList.remove('active');
            }

            function fillShopModal() {
                const list = document.getElementById('machineShopList');
                list.innerHTML = MACHINES.map(m => {
                    return `<div class="machine-shop-item">
                        <div>
                            <strong>${m.name}</strong><br>
                            ⚡️ ${m.outputPerDay}/день | себестоимость ${m.costPerItem} мон<br>
                            💲 цена: ${m.price} мон
                        </div>
                        <button onclick="window.buyMachine('${m.id}')">Купить</button>
                    </div>`;
                }).join('');
            }

            function fillLoanModal() {
                const list = document.getElementById('loanOfferList');
                list.innerHTML = LOAN_OFFERS.map(offer => {
                    return `<div class="loan-offer-item">
                        <div>
                            <strong>${offer.name}</strong><br>
                            ${offer.interestRate*100}% в день, срок ${offer.termDays} дн.
                        </div>
                        <button onclick="window.promptLoan('${offer.id}', ${offer.maxAmount})">Выбрать</button>
                    </div>`;
                }).join('');
            }

            window.promptLoan = function(offerId, maxAmount) {
                if (cheaterDetected) return;
                let amount = prompt(`Введите сумму кредита (макс. ${maxAmount}):`, maxAmount);
                if (amount === null) return;
                amount = parseInt(amount);
                if (isNaN(amount) || amount <= 0 || amount > maxAmount) {
                    showNotification('Некорректная сумма');
                    return;
                }
                takeLoan(offerId, amount);
            };

            window.buyMachine = function(machineId) {
                if (cheaterDetected) return;
                buyMachine(machineId);
            };

            // --- ИНТЕРАКТИВНЫЙ ТУР ---
            const tourSteps = [
                { element: '.money', text: '💰 Здесь твои деньги. Зарабатывай их, выполняя заказы!' },
                { element: '.day', text: '📅 Каждый день нажимай кнопку "НОВЫЙ ДЕНЬ", чтобы производить товары и получать новые заказы.' },
                { element: '.rating', text: '⭐ Рейтинг показывает, насколько успешно ты ведёшь дело. Он растёт от прибыли и выполненных заказов.' },
                { element: '.player-info', text: '🧑 Твоё имя. Прогресс сохраняется автоматически.' },
                { element: '#ordersContainer .order-card:first-child', text: '📋 Доступные заказы. Чем меньше срок, тем дороже оплата. Бери, если есть подходящий станок.' },
                { element: '#myOrdersContainer', text: '⏳ Взятые заказы. Они будут выполнены, когда на складе накопится нужное количество товара.' },
                { element: '#tabMachines', text: '🏭 Вкладка "Станки" — здесь ты видишь свои станки, их здоровье и производительность. Ремонтируй их вовремя!' },
                { element: '#tabStorage', text: '📦 Вкладка "Склад" — здесь хранится готовая продукция. Себестоимость указана в скобках.' },
                { element: '#buyMachineBtn', text: '➕ Купить новый станок. Открывает магазин, где можно выбрать подходящий.' },
                { element: '#activeLoansContainer', text: '💰 Активные кредиты. Не бери больше двух сразу, иначе рейтинг упадёт.' },
                { element: '#newDayBtn', text: '➡️ НОВЫЙ ДЕНЬ — самая важная кнопка. Запускает производство, списывает себестоимость, начисляет проценты по кредитам и приносит новые заказы.' }
            ];

            let currentTourStep = 0;
            const tourOverlay = document.getElementById('tourOverlay');
            const tourHighlight = document.getElementById('tourHighlight');
            const tourTooltip = document.getElementById('tourTooltip');
            const tourText = document.getElementById('tourText');
            const tourNext = document.getElementById('tourNext');
            const tourSkip = document.getElementById('tourSkip');
            const helpBtn = document.getElementById('helpBtn');

            function updateTourHighlight() {
                const step = tourSteps[currentTourStep];
                const element = document.querySelector(step.element);
                if (!element) {
                    currentTourStep++;
                    if (currentTourStep < tourSteps.length) updateTourHighlight();
                    else endTour();
                    return;
                }
                const rect = element.getBoundingClientRect();
                tourHighlight.style.top = rect.top + window.scrollY + 'px';
                tourHighlight.style.left = rect.left + window.scrollX + 'px';
                tourHighlight.style.width = rect.width + 'px';
                tourHighlight.style.height = rect.height + 'px';
                tourHighlight.classList.add('active');

                tourText.innerText = step.text;

                const tooltipX = rect.right + 20;
                const tooltipY = rect.top + window.scrollY;
                if (tooltipX + 400 > window.innerWidth) {
                    tourTooltip.style.left = (rect.left - 420) + 'px';
                } else {
                    tourTooltip.style.left = (rect.right + 20) + 'px';
                }
                tourTooltip.style.top = tooltipY + 'px';
                tourTooltip.classList.add('active');
            }

            function startTour() {
                // Запуск тура доступен только после входа в игру
                if (!game || !game.playerName) {
                    showNotification('Сначала войдите в игру');
                    return;
                }
                // Скрываем анимацию кнопки, так как тур начался
                helpBtn.classList.remove('help-icon-attention');
                currentTourStep = 0;
                tourOverlay.classList.add('active');
                tourTooltip.classList.add('active');
                updateTourHighlight();
            }

            function endTour() {
                tourOverlay.classList.remove('active');
                tourHighlight.classList.remove('active');
                tourTooltip.classList.remove('active');
                // После окончания тура ставим флаг, чтобы убрать анимацию
                if (game && game.playerName) {
                    localStorage.setItem('tourShown_' + game.playerName, 'true');
                    updateHelpButtonAnimation();
                }
            }

            tourNext.addEventListener('click', () => {
                currentTourStep++;
                if (currentTourStep < tourSteps.length) {
                    updateTourHighlight();
                } else {
                    endTour();
                }
            });

            tourSkip.addEventListener('click', endTour);

            window.addEventListener('resize', () => {
                if (tourOverlay.classList.contains('active')) {
                    updateTourHighlight();
                }
            });

            // --- Управление анимацией кнопки помощи ---
            function updateHelpButtonAnimation() {
                if (!game || !game.playerName) return;
                const tourKey = 'tourShown_' + game.playerName;
                if (!localStorage.getItem(tourKey)) {
                    helpBtn.classList.add('help-icon-attention');
                } else {
                    helpBtn.classList.remove('help-icon-attention');
                }
            }

            // Обработчик клика на кнопку помощи с проверкой входа
            helpBtn.addEventListener('click', startTour);

            // При входе в игру
            function loadGame(name) {
                if (!name) return;
                const saved = localStorage.getItem(getSaveKey(name));
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        game = parsed;
                        game.equipment.forEach((m, index) => {
                            if (!m.uid) m.uid = m.id + '_' + Date.now() + '_' + index;
                        });
                    } catch (e) { game = null; }
                }
                if (!game) {
                    game = {
                        day: 1,
                        cash: 0,
                        rating: 0,
                        equipment: [],
                        storage: { toy: 0, furniture: 0, food: 0 },
                        activeLoans: [],
                        myOrders: [],
                        availableOrders: [],
                        completedOrders: 0,
                        failedOrders: 0,
                        playerName: name
                    };
                    for (let i = 0; i < 3; i++) game.availableOrders.push(generateRandomOrder());
                }
                document.getElementById('playerNameDisplay').innerText = game.playerName;
                document.getElementById('loginModal').classList.remove('active');
                render();

                // Обновляем состояние анимации кнопки помощи
                updateHelpButtonAnimation();
            }

            // Обработчики входа
            loadProfileList();

            document.getElementById('loginBtn').addEventListener('click', () => {
                const selected = document.getElementById('profileSelect').value;
                if (selected) {
                    loadGame(selected);
                } else {
                    alert('Выберите профиль из списка');
                }
            });

            document.getElementById('newGameBtn').addEventListener('click', () => {
                const newName = document.getElementById('newPlayerName').value.trim();
                if (newName) {
                    loadGame(newName);
                } else {
                    alert('Введите имя для новой игры');
                }
            });

            document.getElementById('closeNotificationBtn').addEventListener('click', closeNotification);
            document.getElementById('closeShopModal').addEventListener('click', () => closeModal('shopModal'));
            document.getElementById('closeLoanModal').addEventListener('click', () => closeModal('loanModal'));

            document.getElementById('tabMachines').addEventListener('click', () => {
                document.getElementById('tabMachines').classList.add('active');
                document.getElementById('tabStorage').classList.remove('active');
                document.getElementById('machinesTab').style.display = 'block';
                document.getElementById('storageTab').style.display = 'none';
                render();
            });
            document.getElementById('tabStorage').addEventListener('click', () => {
                document.getElementById('tabStorage').classList.add('active');
                document.getElementById('tabMachines').classList.remove('active');
                document.getElementById('storageTab').style.display = 'block';
                document.getElementById('machinesTab').style.display = 'none';
                render();
            });

            document.getElementById('buyMachineBtn').addEventListener('click', () => openModal('shopModal'));
            document.getElementById('takeLoanBtn').addEventListener('click', () => openModal('loanModal'));
            document.getElementById('newDayBtn').addEventListener('click', nextDay);
        })();
    </script>
</body>
</html>
